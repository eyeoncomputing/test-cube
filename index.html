<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Test Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./marker.mind;" embedded>
        <a-entity camera></a-entity>
        <a-entity mindar-image-target="id: solar-system">
            <a-plane position="0 0 0" width="2" height="2" color="red"></a-plane>
        </a-entity>
    </a-scene>
</body>
</html>
